<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таблица</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@300;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --border: #2a2d3a;
    --accent: #5b8cff;
    --accent2: #a78bfa;
    --text: #e2e4ef;
    --muted: #6b7099;
    --row-hover: #1e2130;
    --header-bg: #1a1d28;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background grid ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: .25;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 40px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 600;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    letter-spacing: -.02em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    font-size: .7rem;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
    align-items: center;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: .8rem;
    padding: 10px 14px 10px 38px;
    border-radius: 8px;
    outline: none;
    transition: border-color .2s;
  }

  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--muted); }

  .search-box svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: .75rem;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    white-space: nowrap;
  }

  .btn:hover { border-color: var(--accent); background: var(--row-hover); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .btn.primary:hover { background: #7aa4ff; }

  .counter {
    font-size: .72rem;
    color: var(--muted);
    margin-left: auto;
  }

  /* ── Sheet tabs ── */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: inherit;
    font-size: .72rem;
    cursor: pointer;
    transition: all .2s;
  }

  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Table container ── */
  .table-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: auto;
    max-height: 70vh;
    position: relative;
  }

  table {
    border-collapse: collapse;
    width: 100%;
    font-size: .78rem;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 10;
  }

  thead tr {
    background: var(--header-bg);
  }

  th {
    padding: 14px 16px;
    text-align: left;
    font-family: 'Unbounded', sans-serif;
    font-size: .65rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color .2s;
  }

  th:hover { color: var(--accent); }
  th .sort-icon { margin-left: 6px; opacity: .4; }
  th.sorted { color: var(--accent); }
  th.sorted .sort-icon { opacity: 1; }

  /* Row number column */
  th.rn, td.rn {
    color: var(--muted);
    font-size: .68rem;
    min-width: 46px;
    text-align: center;
    cursor: default;
    border-right: 1px solid var(--border);
  }

  td {
    padding: 11px 16px;
    border-bottom: 1px solid #1c1e28;
    color: var(--text);
    white-space: nowrap;
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background .15s;
  }

  tbody tr:hover td { background: var(--row-hover); }

  tbody tr:last-child td { border-bottom: none; }

  /* ── States ── */
  .state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    gap: 14px;
    color: var(--muted);
    font-size: .82rem;
  }

  .state .icon { font-size: 2.5rem; }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px; right: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: .78rem;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all .3s ease;
    max-width: 340px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-color: #ff5b5b; }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo">📊</div>
    <div>
      <h1 id="sheetTitle">Google Sheets Viewer</h1>
      <p id="sheetDesc">Загрузка данных…</p>
    </div>
  </header>

  <div class="controls">
    <div class="search-box">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Поиск по таблице…" oninput="filterTable()">
    </div>
    <button class="btn" onclick="exportCSV()">⬇ CSV</button>
    <button class="btn primary" onclick="loadSheet()">↻ Обновить</button>
    <span class="counter" id="rowCounter"></span>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="table-container" id="tableContainer">
    <div class="state"><div class="spinner"></div><span>Загрузка таблицы…</span></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────
//  НАСТРОЙКИ
// ─────────────────────────────────────────
const SHEET_ID = '1sYvrBU9BPhcoxTnNJfx8TOutxwFrSiRm2mw_8s6rdZM';

// Листы по названию (именно так, как в таблице)
const SHEETS = {
  'Список (new)':            { gid: '846561775' },
  'Профиль (копия)':         { gid: null, name: 'Профиль (копия)' },
  'Коллекционеры':           { gid: null, name: 'Коллекционеры' },
  'Арканы/Пути(new)':        { gid: null, name: 'Арканы/Пути(new)' },
  'Вайтлист':                { gid: null, name: 'Вайтлист' },
  'Регист.':                 { gid: null, name: 'Регист.' },
  'Интерактив':              { gid: null, name: 'Интерактив' },
  'Хотелки по общему от 12.05': { gid: null, name: 'Хотелки по общему от 12.05' },
  'Карты в общем от 17.05':  { gid: null, name: 'Карты в общем от 17.05' },
  'БД':                      { gid: null, name: 'БД' },
  'транзакции':              { gid: null, name: 'транзакции' },
};
// ─────────────────────────────────────────

let currentData = [];      // { cols, rows }
let currentSheetName = '';
let sortState = { col: -1, dir: 1 };

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3500);
}

// ── Build tab buttons ────────────────────
(function buildTabs() {
  const container = document.getElementById('tabs');
  Object.keys(SHEETS).forEach((name, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = name;
    btn.dataset.sheet = name;
    btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      loadSheet(name);
    };
    container.appendChild(btn);
  });
})();

// ── Col letter helper ──────────────────────
function colLetter(i) {
  let s = '';
  i++;
  while (i > 0) { s = String.fromCharCode(64 + (i % 26 || 26)) + s; i = Math.floor((i - 1) / 26); }
  return s;
}

// ── Load sheet data ──────────────────────
async function loadSheet(sheetName) {
  if (!sheetName) sheetName = Object.keys(SHEETS)[0];
  currentSheetName = sheetName;
  const sheet = SHEETS[sheetName];
  const gid = sheet?.gid;
  const sheetParam = gid ? `gid=${gid}` : `sheet=${encodeURIComponent(sheet?.name || sheetName)}`;

  document.getElementById('tableContainer').innerHTML =
    '<div class="state"><div class="spinner"></div><span>Загрузка…</span></div>';
  document.getElementById('rowCounter').textContent = '';
  sortState = { col: -1, dir: 1 };

  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&${sheetParam}`;

  try {
    const res = await fetch(url);
    const text = await res.text();
    const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if (!match) throw new Error('Таблица закрыта или нет доступа');
    const json = JSON.parse(match[1]);
    if (json.status === 'error') throw new Error(json.errors?.[0]?.detailed_message || 'Ошибка API');

    // Keep ALL columns; use letter fallback if label is empty
    const cols = json.table.cols.map((c, i) => ({ ...c, label: c.label || colLetter(i) }));
    const rows = json.table.rows.map(r =>
      cols.map((_, ci) => { const cell = r.c?.[ci]; return cell?.f ?? cell?.v ?? ''; })
    );

    currentData = { cols, rows };
    document.getElementById('sheetDesc').textContent =
      `${sheetName} · ${rows.length} строк · ${cols.length} столбцов`;
    document.getElementById('sheetTitle').textContent = 'Google Sheets Viewer';

    renderTable(cols, rows);
    toast(`✓ Загружено ${rows.length} строк`);
  } catch (e) {
    document.getElementById('tableContainer').innerHTML =
      `<div class="state"><div class="icon">🔒</div><span>${e.message}</span>
       <span style="font-size:.7rem;max-width:320px;text-align:center;opacity:.6">
         Убедись, что таблица открыта: Настройки доступа → Все, у кого есть ссылка → Наблюдатель
       </span></div>`;
    toast(e.message, true);
  }
}

// ── Render ───────────────────────────────
function renderTable(cols, rows, filtered) {
  const display = filtered ?? rows;
  const tc = document.getElementById('tableContainer');
  document.getElementById('rowCounter').textContent =
    filtered ? `${display.length} / ${rows.length} строк` : `${rows.length} строк`;

  if (!display.length) {
    tc.innerHTML = '<div class="state"><div class="icon">🔍</div><span>Ничего не найдено</span></div>';
    return;
  }

  let html = '<table><thead><tr>';
  html += `<th class="rn">#</th>`;
  cols.forEach((col, i) => {
    const sorted = sortState.col === i;
    const icon = sorted ? (sortState.dir === 1 ? '↑' : '↓') : '↕';
    html += `<th onclick="sortBy(${i})" class="${sorted ? 'sorted' : ''}">
      ${esc(col.label)} <span class="sort-icon">${icon}</span></th>`;
  });
  html += '</tr></thead><tbody>';

  display.forEach((row, ri) => {
    html += `<tr><td class="rn">${ri + 1}</td>`;
    cols.forEach((_, ci) => {
      html += `<td title="${esc(String(row[ci] ?? ''))}">${esc(String(row[ci] ?? ''))}</td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  tc.innerHTML = html;
}

// ── Sort ─────────────────────────────────
function sortBy(colIdx) {
  if (sortState.col === colIdx) sortState.dir *= -1;
  else { sortState.col = colIdx; sortState.dir = 1; }

  const { cols, rows } = currentData;
  const sorted = [...rows].sort((a, b) => {
    const va = a[colIdx] ?? '', vb = b[colIdx] ?? '';
    const na = parseFloat(va), nb = parseFloat(vb);
    if (!isNaN(na) && !isNaN(nb)) return (na - nb) * sortState.dir;
    return String(va).localeCompare(String(vb), 'ru') * sortState.dir;
  });

  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const display = q ? sorted.filter(r => r.some(c => String(c).toLowerCase().includes(q))) : sorted;
  renderTable(cols, sorted, display);
}

// ── Search ───────────────────────────────
function filterTable() {
  const { cols, rows } = currentData;
  if (!rows) return;
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = q ? rows.filter(r => r.some(c => String(c).toLowerCase().includes(q))) : undefined;
  renderTable(cols, rows, filtered);
}

// ── CSV export ───────────────────────────
function exportCSV() {
  const { cols, rows } = currentData;
  if (!rows?.length) return toast('Нет данных для экспорта', true);
  const header = cols.map(c => `"${c.label}"`).join(',');
  const body = rows.map(r => r.map(v => `"${String(v ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + header + '\n' + body], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${currentSheetName || 'sheet'}.csv`;
  a.click();
  toast('✓ CSV скачан');
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ─────────────────────────────────
loadSheet();
</script>
</body>
</html>
